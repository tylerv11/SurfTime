name: Update Surf Conditions

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Gate scheduled runs to 6am Pacific
        if: github.event_name == 'schedule'
        run: |
          current_hour=$(TZ=America/Los_Angeles date +%H)
          if [ "$current_hour" != "06" ]; then
            echo "Skipping scheduled run outside 6:00 AM Pacific (current hour: $current_hour)."
            exit 0
          fi

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run surf conditions pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python python/orchestrator/run.py
